<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid Areas Architect — Visual grid-template-areas Designer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --ink: #161310;
        --ink2: #1e1a15;
        --ink3: #26211b;
        --line: #3a332a;
        --line-soft: #2c2620;
        --cream: #f3ebd9;
        --cream-dim: #b8ac96;
        --brass: #c68f4e;
        --brass-bright: #e8ac66;
        --brass-glow: rgba(198, 143, 78, 0.25);
        --teal: #4a9d92;
        --teal-dim: #2f6b63;
        --teal-glow: rgba(74, 157, 146, 0.2);
        --danger: #c9573f;
        --danger-glow: rgba(201, 87, 63, 0.22);
        --good: #7fa66b;
        --font-display: "Fraunces", serif;
        --font-ui: "Plus Jakarta Sans", sans-serif;
        --font-code: "JetBrains Mono", monospace;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        background: var(--ink);
      }
      body {
        background: radial-gradient(ellipse at 15% -10%, #2a2118 0%, transparent 55%), radial-gradient(ellipse at 90% 10%, #1c2b28 0%, transparent 50%), var(--ink);
        color: var(--cream);
        font-family: var(--font-ui);
        min-height: 100vh;
        line-height: 1.6;
      }
      button,
      input,
      select {
        font-family: inherit;
        color: inherit;
      }
      button {
        cursor: pointer;
        background: none;
        border: none;
      }
      button:focus-visible,
      input:focus-visible {
        outline: 2px solid var(--brass-bright);
        outline-offset: 2px;
      }
      ::selection {
        background: var(--brass-glow);
      }

      .wrap {
        max-width: 1180px;
        margin: 0 auto;
        padding: 36px 24px 70px;
      }

      /* ---- header ---- */
      .masthead {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 20px;
        flex-wrap: wrap;
        margin-bottom: 30px;
        padding-bottom: 24px;
        border-bottom: 1px solid var(--line);
      }
      .brand-mark {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .brand-icon {
        width: 44px;
        height: 44px;
        flex-shrink: 0;
      }
      .brand-text h1 {
        font-family: var(--font-display);
        font-weight: 600;
        font-size: 27px;
        color: var(--cream);
        letter-spacing: 0.01em;
      }
      .brand-text p {
        font-size: 12.5px;
        color: var(--cream-dim);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-top: 4px;
      }
      .masthead-note {
        max-width: 340px;
        font-size: 12.5px;
        color: var(--cream-dim);
        line-height: 1.7;
        text-align: right;
      }
      .masthead-note b {
        color: var(--brass-bright);
        font-weight: 600;
      }

      /* ---- layout ---- */
      .studio {
        display: grid;
        grid-template-columns: 300px 1fr;
        gap: 26px;
        align-items: start;
      }
      @media (max-width: 900px) {
        .studio {
          grid-template-columns: 1fr;
        }
      }

      /* ---- side panel ---- */
      .panel {
        background: linear-gradient(165deg, var(--ink2), var(--ink3));
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 20px 20px 22px;
      }
      .panel + .panel {
        margin-top: 20px;
      }
      .panel-title {
        font-family: var(--font-ui);
        font-weight: 700;
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--brass-bright);
        margin-bottom: 14px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .panel-title svg {
        width: 14px;
        height: 14px;
      }

      .stepper-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
      }
      .stepper-row:last-child {
        margin-bottom: 0;
      }
      .stepper-label {
        font-size: 13px;
        color: var(--cream-dim);
        font-weight: 500;
      }
      .stepper {
        display: flex;
        align-items: center;
        gap: 2px;
        background: rgba(0, 0, 0, 0.25);
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
      }
      .stepper button {
        width: 28px;
        height: 28px;
        display: grid;
        place-items: center;
        color: var(--cream-dim);
        font-size: 16px;
        transition:
          background 0.12s,
          color 0.12s;
      }
      .stepper button:hover {
        background: var(--brass-glow);
        color: var(--brass-bright);
      }
      .stepper span {
        width: 30px;
        text-align: center;
        font-family: var(--font-code);
        font-size: 13px;
        color: var(--cream);
        font-weight: 500;
      }

      .slider-row {
        margin-bottom: 4px;
      }
      .slider-row label {
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        color: var(--cream-dim);
        margin-bottom: 8px;
        font-weight: 500;
      }
      .slider-row label span {
        font-family: var(--font-code);
        color: var(--brass-bright);
        font-size: 12.5px;
      }
      input[type="range"] {
        width: 100%;
        accent-color: var(--brass);
      }

      .preset-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 4px;
      }
      .preset-btn {
        padding: 9px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.2);
        font-size: 12px;
        color: var(--cream-dim);
        text-align: left;
        transition:
          border-color 0.15s,
          color 0.15s,
          background 0.15s;
      }
      .preset-btn:hover {
        border-color: var(--brass);
        color: var(--brass-bright);
        background: var(--brass-glow);
      }

      .reset-btn {
        width: 100%;
        margin-top: 14px;
        padding: 10px;
        border: 1px dashed var(--line);
        border-radius: 8px;
        font-size: 12px;
        color: var(--cream-dim);
        text-align: center;
        letter-spacing: 0.03em;
        transition:
          border-color 0.15s,
          color 0.15s;
      }
      .reset-btn:hover {
        border-color: var(--danger);
        color: var(--danger);
      }

      /* ---- area palette ---- */
      .area-chip-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 14px;
      }
      .area-chip {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 10px;
        border-radius: 9px;
        border: 1.5px solid transparent;
        background: rgba(0, 0, 0, 0.18);
        cursor: pointer;
        transition:
          border-color 0.15s,
          background 0.15s;
      }
      .area-chip:hover {
        background: rgba(0, 0, 0, 0.28);
      }
      .area-chip.active {
        border-color: var(--area-color, var(--brass));
        background: color-mix(in srgb, var(--area-color, var(--brass)) 14%, transparent);
      }
      .chip-swatch {
        width: 16px;
        height: 16px;
        border-radius: 5px;
        flex-shrink: 0;
        background: var(--area-color, var(--brass));
        box-shadow: 0 0 8px var(--area-color, var(--brass));
      }
      .chip-name {
        flex: 1;
        font-size: 13.5px;
        font-weight: 500;
        color: var(--cream);
      }
      .chip-del {
        width: 20px;
        height: 20px;
        display: grid;
        place-items: center;
        color: var(--cream-dim);
        border-radius: 5px;
        flex-shrink: 0;
      }
      .chip-del:hover {
        color: var(--danger);
        background: var(--danger-glow);
      }
      .chip-del svg {
        width: 12px;
        height: 12px;
      }
      .eraser-chip {
        border: 1.5px dashed var(--line);
      }
      .eraser-chip.active {
        border-color: var(--danger);
        background: var(--danger-glow);
      }

      .add-area-form {
        display: flex;
        gap: 6px;
      }
      .add-area-form input {
        flex: 1;
        background: rgba(0, 0, 0, 0.28);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 9px 11px;
        font-size: 13px;
        color: var(--cream);
      }
      .add-area-form input::placeholder {
        color: var(--cream-dim);
        opacity: 0.6;
      }
      .add-area-form button {
        width: 38px;
        border: 1px solid var(--teal-dim);
        background: var(--teal-glow);
        border-radius: 8px;
        display: grid;
        place-items: center;
        color: var(--teal);
        transition: background 0.15s;
      }
      .add-area-form button:hover {
        background: rgba(74, 157, 146, 0.35);
      }
      .add-area-form button svg {
        width: 16px;
        height: 16px;
      }

      /* ---- main canvas column ---- */
      .canvas-card {
        background: linear-gradient(165deg, var(--ink2), var(--ink3));
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 26px;
        margin-bottom: 24px;
      }
      .canvas-toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 18px;
        flex-wrap: wrap;
        gap: 10px;
      }
      .canvas-toolbar-title {
        font-family: var(--font-ui);
        font-weight: 700;
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--cream-dim);
      }
      .validity-pill {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 6px 13px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        border: 1px solid var(--good);
        color: var(--good);
        background: rgba(127, 166, 107, 0.1);
      }
      .validity-pill.invalid {
        border-color: var(--danger);
        color: var(--danger);
        background: var(--danger-glow);
      }
      .validity-pill svg {
        width: 13px;
        height: 13px;
      }

      .grid-canvas-frame {
        display: flex;
        justify-content: center;
        padding: 8px 0 4px;
        user-select: none;
      }
      .grid-canvas {
        display: grid;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 0 0 1px var(--line);
      }
      .gcell {
        position: relative;
        min-width: 56px;
        min-height: 52px;
        background: repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.02) 0 6px, transparent 6px 12px), rgba(0, 0, 0, 0.22);
        border: 1px solid var(--line-soft);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--font-ui);
        font-weight: 600;
        font-size: 11.5px;
        letter-spacing: 0.02em;
        color: var(--cream);
        cursor: crosshair;
        transition: filter 0.1s;
      }
      .gcell:hover {
        filter: brightness(1.15);
      }
      .gcell.filled {
        border-color: rgba(0, 0, 0, 0.3);
        color: #1b1611;
        text-shadow: none;
      }
      .gcell.invalid-cell {
        box-shadow: inset 0 0 0 2px var(--danger);
      }
      .gcell.invalid-cell::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: repeating-linear-gradient(135deg, rgba(201, 87, 63, 0.35) 0 5px, transparent 5px 10px);
      }
      .canvas-hint {
        text-align: center;
        font-size: 12px;
        color: var(--cream-dim);
        margin-top: 14px;
        font-style: italic;
      }
      .canvas-hint b {
        color: var(--brass-bright);
        font-style: normal;
      }

      .errors-box {
        margin-top: 16px;
        background: var(--danger-glow);
        border: 1px solid var(--danger);
        border-radius: 10px;
        padding: 13px 16px;
      }
      .errors-box-title {
        display: flex;
        align-items: center;
        gap: 7px;
        font-size: 12px;
        font-weight: 700;
        color: var(--danger);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 8px;
      }
      .errors-box-title svg {
        width: 14px;
        height: 14px;
        flex-shrink: 0;
      }
      .errors-box ul {
        list-style: none;
      }
      .errors-box li {
        font-size: 12.5px;
        color: var(--cream);
        margin-bottom: 4px;
        padding-left: 16px;
        position: relative;
      }
      .errors-box li::before {
        content: "—";
        position: absolute;
        left: 0;
        color: var(--danger);
      }

      /* ---- track editors ---- */
      .tracks-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-top: 8px;
      }
      @media (max-width: 640px) {
        .tracks-grid {
          grid-template-columns: 1fr;
        }
      }
      .track-group-title {
        font-size: 12px;
        font-weight: 700;
        color: var(--cream-dim);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 10px;
      }
      .track-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }
      .track-row-label {
        width: 20px;
        font-family: var(--font-code);
        font-size: 11px;
        color: var(--cream-dim);
        flex-shrink: 0;
      }
      .track-row input[type="text"] {
        flex: 1;
        background: rgba(0, 0, 0, 0.28);
        border: 1px solid var(--line);
        border-radius: 7px;
        padding: 7px 9px;
        font-family: var(--font-code);
        font-size: 12.5px;
        color: var(--brass-bright);
        min-width: 0;
      }
      .track-quick {
        display: flex;
        gap: 4px;
        flex-shrink: 0;
      }
      .track-quick button {
        font-family: var(--font-code);
        font-size: 10px;
        padding: 6px 7px;
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--cream-dim);
        transition:
          border-color 0.15s,
          color 0.15s;
      }
      .track-quick button:hover {
        border-color: var(--teal);
        color: var(--teal);
      }

      /* ---- output section ---- */
      .output-grid {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 22px;
      }
      @media (max-width: 900px) {
        .output-grid {
          grid-template-columns: 1fr;
        }
      }

      .code-card {
        background: #0e0c09;
        border: 1px solid var(--line);
        border-radius: 14px;
        overflow: hidden;
      }
      .code-card-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 18px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.02);
      }
      .code-card-head span {
        font-family: var(--font-ui);
        font-weight: 700;
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--cream-dim);
      }
      .copy-btn {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        font-size: 12px;
        font-weight: 600;
        color: var(--teal);
        border: 1px solid var(--teal-dim);
        padding: 7px 14px;
        border-radius: 20px;
        transition: background 0.15s;
      }
      .copy-btn:hover {
        background: var(--teal-glow);
      }
      .copy-btn svg {
        width: 13px;
        height: 13px;
      }
      .copy-btn.copied {
        border-color: var(--good);
        color: var(--good);
      }
      pre.code-block {
        padding: 18px 20px;
        font-family: var(--font-code);
        font-size: 12.5px;
        line-height: 1.75;
        white-space: pre-wrap;
        word-break: break-word;
        overflow-wrap: anywhere;
        color: #d8cdb4;
        max-height: 420px;
        overflow-y: auto;
      }
      .code-block .sel {
        color: var(--teal);
      }
      .code-block .prop {
        color: var(--brass-bright);
      }
      .code-block .val {
        color: #e8dcc0;
      }
      .code-block .str {
        color: #9fd0a0;
      }
      .code-block .cmt {
        color: #6b6355;
        font-style: italic;
      }
      .code-block .brace {
        color: var(--cream-dim);
      }

      .preview-card {
        background: linear-gradient(165deg, var(--ink2), var(--ink3));
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 20px;
      }
      .preview-card-title {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--cream-dim);
        margin-bottom: 14px;
      }
      .arch-preview .live-grid {
        border-radius: 10px;
        overflow: hidden;
        min-height: 260px;
        box-shadow: 0 0 0 1px var(--line);
      }
      .arch-preview .live-cell {
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--font-ui);
        font-weight: 600;
        font-size: 12.5px;
        color: #1b1611;
        padding: 10px;
        text-align: center;
        letter-spacing: 0.02em;
      }

      /* ---- footer legend ---- */
      .legend-note {
        margin-top: 24px;
        font-size: 12px;
        color: var(--cream-dim);
        text-align: center;
        line-height: 1.7;
      }
      .legend-note b {
        color: var(--brass-bright);
        font-weight: 600;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          transition: none !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <script>
      /* ============================================================
   GRID AREAS ARCHITECT
   Visual designer for CSS grid-template-areas
   ============================================================ */

      /* ---------- ICONS ---------- */
      const ICON = {
        brand: `<svg viewBox="0 0 44 44" fill="none"><rect x="4" y="4" width="16" height="16" rx="3" fill="#c68f4e"/><rect x="24" y="4" width="16" height="7" rx="3" fill="#4a9d92"/><rect x="24" y="15" width="16" height="9" rx="3" fill="#e8ac66"/><rect x="4" y="24" width="16" height="16" rx="3" fill="#2f6b63"/><rect x="24" y="28" width="16" height="12" rx="3" fill="#c68f4e"/></svg>`,
        plus: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>`,
        trash: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9 7V4h6v3M6 7l1 14h10l1-14"/></svg>`,
        eraser: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13l-7 7H5l-2-2 11-11z"/><path d="M13 4l7 7-4 4-7-7z"/></svg>`,
        check: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12l6 6L20 6"/></svg>`,
        alert: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4M12 17h.01M10.3 3.9L2.7 17a2 2 0 0 0 1.7 3h15.2a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg>`,
        copy: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>`,
        layers: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 2 8l10 5 10-5-10-5z"/><path d="M2 13l10 5 10-5"/><path d="M2 18l10 5 10-5"/></svg>`,
        grid: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>`,
        sparkle: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v4M12 17v4M3 12h4M17 12h4M6 6l2.5 2.5M15.5 15.5L18 18M6 18l2.5-2.5M15.5 8.5L18 6"/></svg>`
      };

      /* ---------- COLOR PALETTE FOR AREAS ---------- */
      const AREA_COLORS = ["#c68f4e", "#4a9d92", "#b56d9c", "#8aa65a", "#5c8fc4", "#c9573f", "#d6b04a", "#7d6bb0"];

      /* ---------- PRESETS ---------- */
      const PRESETS = {
        holyGrail: {
          label: "Holy Grail",
          rows: 3,
          cols: 4,
          gap: 14,
          colTracks: ["200px", "1fr", "1fr", "220px"],
          rowTracks: ["auto", "1fr", "auto"],
          layout: [
            ["header", "header", "header", "header"],
            ["nav", "main", "main", "aside"],
            ["footer", "footer", "footer", "footer"]
          ]
        },
        dashboard: {
          label: "Dashboard",
          rows: 3,
          cols: 3,
          gap: 16,
          colTracks: ["220px", "1fr", "1fr"],
          rowTracks: ["64px", "1fr", "1fr"],
          layout: [
            ["sidebar", "topbar", "topbar"],
            ["sidebar", "content", "content"],
            ["sidebar", "content", "content"]
          ]
        },
        card: {
          label: "Card",
          rows: 3,
          cols: 2,
          gap: 10,
          colTracks: ["120px", "1fr"],
          rowTracks: ["auto", "1fr", "auto"],
          layout: [
            ["image", "title"],
            ["image", "body"],
            ["image", "footer"]
          ]
        },
        splitFeature: {
          label: "Split Feature",
          rows: 2,
          cols: 2,
          gap: 20,
          colTracks: ["1fr", "1fr"],
          rowTracks: ["1fr", "auto"],
          layout: [
            ["visual", "copy"],
            ["visual", "cta"]
          ]
        }
      };

      /* ---------- STATE ---------- */
      let state = null;

      function freshState() {
        return {
          rows: 3,
          cols: 3,
          gap: 16,
          areas: [], // {name, color}
          grid: makeEmptyGrid(3, 3),
          colTracks: ["1fr", "1fr", "1fr"],
          rowTracks: ["1fr", "1fr", "1fr"],
          activeTool: "eraser",
          copied: false
        };
      }
      function makeEmptyGrid(rows, cols) {
        return Array.from({ length: rows }, () => Array.from({ length: cols }, () => null));
      }

      state = freshState();

      /* ---------- HELPERS ---------- */
      function esc(s) {
        const d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }
      function nextColor() {
        return AREA_COLORS[state.areas.length % AREA_COLORS.length];
      }
      function findArea(name) {
        return state.areas.find((a) => a.name === name);
      }

      /* Resize grid preserving overlap with old data */
      function resizeGrid(newRows, newCols) {
        const old = state.grid;
        const fresh = makeEmptyGrid(newRows, newCols);
        for (let r = 0; r < Math.min(newRows, old.length); r++) {
          for (let c = 0; c < Math.min(newCols, old[0].length); c++) {
            fresh[r][c] = old[r][c];
          }
        }
        state.grid = fresh;
        state.rows = newRows;
        state.cols = newCols;
        state.colTracks = resizeTrackArray(state.colTracks, newCols);
        state.rowTracks = resizeTrackArray(state.rowTracks, newRows);
      }
      function resizeTrackArray(arr, len) {
        const out = arr.slice(0, len);
        while (out.length < len) out.push("1fr");
        return out;
      }
      function errorsBoxHtml(validity) {
        if (validity.valid) return "";
        return `<div class="errors-box">
    <div class="errors-box-title">${ICON.alert} Fix before copying</div>
    <ul>${validity.errors.map((e) => `<li>${esc(e)}</li>`).join("")}</ul>
  </div>`;
      }
      function refreshOutputs() {
        const validity = validateLayout();
        const rules = buildRules();
        const pill = document.getElementById("validity-pill");
        if (pill) {
          pill.className = `validity-pill ${validity.valid ? "" : "invalid"}`;
          pill.innerHTML = `${validity.valid ? ICON.check : ICON.alert} ${validity.valid ? "Valid rectangular layout" : `${validity.errors.length} region issue${validity.errors.length > 1 ? "s" : ""}`}`;
        }
        const errWrap = document.getElementById("errors-box-wrapper");
        if (errWrap) errWrap.innerHTML = errorsBoxHtml(validity);
        const codeOut = document.getElementById("code-output");
        if (codeOut) codeOut.innerHTML = state.areas.length ? formatRulesHTML(rules) : `<span class="cmt">/* Add at least one named area to generate CSS */</span>`;
        const preview = document.getElementById("live-preview-wrapper");
        if (preview) {
          preview.innerHTML = `<style>${state.areas.length ? formatRulesScoped(rules, ".arch-preview") : ""}</style>
      <div class="live-grid grid-container">
        ${state.areas.map((a) => `<div class="live-cell ${a.name}" style="background:${a.color}CC">${esc(a.name)}</div>`).join("")}
      </div>`;
        }
      }
      /* ---------- VALIDATION ---------- */
      /* Each named area's occupied cells must form one solid, gap-free rectangle */
      function validateLayout() {
        const errors = [];
        const invalidCells = new Set(); // "r,c"
        const namesUsed = new Set();
        state.grid.forEach((row) =>
          row.forEach((v) => {
            if (v) namesUsed.add(v);
          })
        );

        namesUsed.forEach((name) => {
          let minR = Infinity,
            maxR = -1,
            minC = Infinity,
            maxC = -1;
          for (let r = 0; r < state.rows; r++) {
            for (let c = 0; c < state.cols; c++) {
              if (state.grid[r][c] === name) {
                minR = Math.min(minR, r);
                maxR = Math.max(maxR, r);
                minC = Math.min(minC, c);
                maxC = Math.max(maxC, c);
              }
            }
          }
          let ok = true;
          for (let r = minR; r <= maxR; r++) {
            for (let c = minC; c <= maxC; c++) {
              if (state.grid[r][c] !== name) {
                ok = false;
                invalidCells.add(r + "," + c);
              }
            }
          }
          if (!ok) errors.push(`"${name}" is scattered or has gaps — it must form a single solid rectangle.`);
        });

        return { valid: errors.length === 0, errors, invalidCells };
      }

      /* ---------- CSS GENERATION ---------- */
      function buildRules() {
        const rules = [];
        const areaRowsStr = state.grid.map((row) => '"' + row.map((v) => v || ".").join(" ") + '"');
        rules.push({
          selector: ".grid-container",
          decls: ["display: grid;", `grid-template-columns: ${state.colTracks.join(" ")};`, `grid-template-rows: ${state.rowTracks.join(" ")};`, `gap: ${state.gap}px;`, "grid-template-areas:\n    " + areaRowsStr.join("\n    ") + ";"]
        });
        state.areas.forEach((a) => {
          rules.push({ selector: "." + a.name, decls: [`grid-area: ${a.name};`] });
        });
        return rules;
      }

      function formatRulesHTML(rules) {
        return rules
          .map((r) => {
            const declsHtml = r.decls
              .map((d) => {
                if (d.startsWith("grid-template-areas")) {
                  const [head, ...rest] = d.split("\n");
                  const prop = head.split(":")[0];
                  return `  <span class="prop">${prop}</span>: \n${rest.map((line) => `    <span class="str">${esc(line)}</span>`).join("\n")}`;
                }
                const idx = d.indexOf(":");
                const prop = d.slice(0, idx);
                const val = d
                  .slice(idx + 1)
                  .replace(";", "")
                  .trim();
                return `  <span class="prop">${prop}</span>: <span class="val">${esc(val)}</span>;`;
              })
              .join("\n");
            return `<span class="sel">${r.selector}</span> <span class="brace">{</span>\n${declsHtml}\n<span class="brace">}</span>`;
          })
          .join("\n\n");
      }
      function formatRulesPlain(rules) {
        return rules
          .map((r) => {
            const declsPlain = r.decls.map((d) => "  " + d).join("\n");
            return `${r.selector} {\n${declsPlain}\n}`;
          })
          .join("\n\n");
      }
      function formatRulesScoped(rules, scope) {
        return rules.map((r) => `${scope} ${r.selector} {\n${r.decls.map((d) => "  " + d).join("\n")}\n}`).join("\n");
      }

      /* ---------- RENDER ---------- */
      function el(html) {
        document.getElementById("app").innerHTML = html;
      }

      function render() {
        const validity = validateLayout();
        const rules = buildRules();

        el(`
  <div class="wrap">
    <div class="masthead">
      <div class="brand-mark">
        <div class="brand-icon">${ICON.brand}</div>
        <div class="brand-text">
          <h1>Grid Areas Architect</h1>
          <p>Visual grid-template-areas designer</p>
        </div>
      </div>
      <p class="masthead-note">Paint named regions onto the canvas below. Each region must form a <b>solid rectangle</b> — that's a real CSS Grid rule, not a limitation of this tool.</p>
    </div>

    <div class="studio">
      <!-- ============ SIDE PANEL ============ -->
      <div>
        <div class="panel">
          <div class="panel-title">${ICON.grid} Grid Dimensions</div>
          <div class="stepper-row">
            <span class="stepper-label">Columns</span>
            <div class="stepper">
              <button onclick="changeCols(-1)">−</button>
              <span>${state.cols}</span>
              <button onclick="changeCols(1)">+</button>
            </div>
          </div>
          <div class="stepper-row">
            <span class="stepper-label">Rows</span>
            <div class="stepper">
              <button onclick="changeRows(-1)">−</button>
              <span>${state.rows}</span>
              <button onclick="changeRows(1)">+</button>
            </div>
          </div>
          <div class="slider-row" style="margin-top:16px">
            <label>Gap <span id="gap-value">${state.gap}px</span></label>
            <input type="range" min="0" max="40" value="${state.gap}" oninput="setGap(this.value)">
          </div>
        </div>

        <div class="panel">
          <div class="panel-title">${ICON.sparkle} Layout Presets</div>
          <div class="preset-grid">
            ${Object.entries(PRESETS)
              .map(([key, p]) => `<button class="preset-btn" onclick="loadPreset('${key}')">${p.label}</button>`)
              .join("")}
          </div>
          <button class="reset-btn" onclick="resetAll()">${"Clear everything & start over"}</button>
        </div>

        <div class="panel">
          <div class="panel-title">${ICON.layers} Named Areas</div>
          <div class="area-chip-list">
            <div class="area-chip eraser-chip ${state.activeTool === "eraser" ? "active" : ""}" onclick="setTool('eraser')">
              <span class="chip-swatch" style="background:transparent; box-shadow:none; display:flex; align-items:center; justify-content:center; color:var(--cream-dim); width:16px; height:16px;">${ICON.eraser}</span>
              <span class="chip-name">Eraser</span>
            </div>
            ${state.areas
              .map(
                (a) => `
              <div class="area-chip ${state.activeTool === a.name ? "active" : ""}" style="--area-color:${a.color}" onclick="setTool('${a.name}')">
                <span class="chip-swatch"></span>
                <span class="chip-name">${esc(a.name)}</span>
                <button class="chip-del" onclick="event.stopPropagation(); removeArea('${a.name}')">${ICON.trash}</button>
              </div>
            `
              )
              .join("")}
          </div>
          <form class="add-area-form" onsubmit="event.preventDefault(); addAreaFromInput();">
            <input type="text" id="new-area-input" placeholder="e.g. sidebar" maxlength="24" autocomplete="off">
            <button type="submit">${ICON.plus}</button>
          </form>
        </div>
      </div>

      <!-- ============ MAIN CANVAS ============ -->
      <div>
        <div class="canvas-card">
          <div class="canvas-toolbar">
            <span class="canvas-toolbar-title">Paint Canvas</span>
            <span class="validity-pill ${validity.valid ? "" : "invalid"}" id="validity-pill">
              ${validity.valid ? ICON.check : ICON.alert}
              ${validity.valid ? "Valid rectangular layout" : `${validity.errors.length} region issue${validity.errors.length > 1 ? "s" : ""}`}
            </span>
          </div>

          <div class="grid-canvas-frame">
            <div class="grid-canvas" id="grid-canvas"
              style="grid-template-columns:repeat(${state.cols}, 1fr); grid-template-rows:repeat(${state.rows}, 1fr);">
              ${renderCells(validity.invalidCells)}
            </div>
          </div>
          <p class="canvas-hint">Click, or click-and-drag, to paint cells with the <b>${state.activeTool === "eraser" ? "Eraser" : esc(state.activeTool)}</b> tool.</p>

          <div id="errors-box-wrapper">${errorsBoxHtml(validity)}</div>

          <div class="tracks-grid">
            <div>
              <div class="track-group-title">Column Tracks</div>
              ${state.colTracks
                .map(
                  (val, i) => `
                <div class="track-row">
                  <span class="track-row-label">C${i + 1}</span>
                  <input type="text" value="${esc(val)}" oninput="setColTrack(${i}, this.value)">
                  <div class="track-quick">
                    <button onclick="setColTrack(${i}, '1fr')">1fr</button>
                    <button onclick="setColTrack(${i}, 'auto')">auto</button>
                  </div>
                </div>
              `
                )
                .join("")}
            </div>
            <div>
              <div class="track-group-title">Row Tracks</div>
              ${state.rowTracks
                .map(
                  (val, i) => `
                <div class="track-row">
                  <span class="track-row-label">R${i + 1}</span>
                  <input type="text" value="${esc(val)}" oninput="setRowTrack(${i}, this.value)">
                  <div class="track-quick">
                    <button onclick="setRowTrack(${i}, '1fr')">1fr</button>
                    <button onclick="setRowTrack(${i}, 'auto')">auto</button>
                  </div>
                </div>
              `
                )
                .join("")}
            </div>
          </div>
        </div>

        <div class="output-grid">
          <div class="code-card">
            <div class="code-card-head">
              <span>Generated CSS</span>
              <button class="copy-btn ${state.copied ? "copied" : ""}" onclick="copyCSS()">
                ${state.copied ? ICON.check : ICON.copy}
                ${state.copied ? "Copied" : "Copy CSS"}
              </button>
            </div>
            <pre class="code-block" id="code-output">${state.areas.length ? formatRulesHTML(rules) : `<span class="cmt">/* Add at least one named area to generate CSS */</span>`}</pre>
          </div>

          <div class="preview-card">
            <div class="preview-card-title">Live Preview</div>
            <div class="arch-preview">
              <div id="live-preview-wrapper">
                <style>${state.areas.length ? formatRulesScoped(rules, ".arch-preview") : ""}</style>
                <div class="live-grid grid-container">
                  ${state.areas.map((a) => `<div class="live-cell ${a.name}" style="background:${a.color}CC">${esc(a.name)}</div>`).join("")}
                </div>
              </div>
            </div>
          </div>
        </div>

        <p class="legend-note">Empty cells become <b>.</b> in <b>grid-template-areas</b>, exactly as the CSS spec requires. The <b>Live Preview</b> renders your real, generated CSS — not an approximation.</p>
      </div>
    </div>
  </div>
  `);
      }

      function renderCells(invalidCells) {
        let html = "";
        for (let r = 0; r < state.rows; r++) {
          for (let c = 0; c < state.cols; c++) {
            const val = state.grid[r][c];
            const area = val ? findArea(val) : null;
            const isInvalid = invalidCells.has(r + "," + c);
            const bg = area ? `background:${area.color};` : "";
            html += `<div class="gcell ${val ? "filled" : ""} ${isInvalid ? "invalid-cell" : ""}" style="${bg}"
        data-r="${r}" data-c="${c}"
        onpointerdown="onCellDown(event, ${r}, ${c})"
        onpointerenter="onCellEnter(${r}, ${c})">${val ? esc(val) : ""}</div>`;
          }
        }
        return html;
      }

      /* ---------- PAINTING (lightweight refresh, no full re-render while dragging) ---------- */
      let isPainting = false;
      document.addEventListener("pointerup", () => {
        isPainting = false;
      });

      function onCellDown(e, r, c) {
        isPainting = true;
        paintCell(r, c);
      }
      function onCellEnter(r, c) {
        if (isPainting) paintCell(r, c);
      }
      function paintCell(r, c) {
        const tool = state.activeTool;
        const newVal = tool === "eraser" ? null : tool;
        if (state.grid[r][c] === newVal) return;
        state.grid[r][c] = newVal;
        render();
      }

      /* ---------- ACTIONS ---------- */
      function changeCols(delta) {
        const next = Math.min(8, Math.max(2, state.cols + delta));
        if (next === state.cols) return;
        resizeGrid(state.rows, next);
        render();
      }
      function changeRows(delta) {
        const next = Math.min(8, Math.max(2, state.rows + delta));
        if (next === state.rows) return;
        resizeGrid(next, state.cols);
        render();
      }
      function setGap(v) {
        state.gap = Number(v);
        const label = document.getElementById("gap-value");
        if (label) label.textContent = state.gap + "px";
        refreshOutputs();
      }
      function setColTrack(i, v) {
        state.colTracks[i] = v.trim() || "1fr";
        refreshOutputs();
      }
      function setRowTrack(i, v) {
        state.rowTracks[i] = v.trim() || "1fr";
        refreshOutputs();
      }
      function setTool(name) {
        state.activeTool = name;
        render();
      }
      function addAreaFromInput() {
        const input = document.getElementById("new-area-input");
        let name = input.value
          .trim()
          .toLowerCase()
          .replace(/[^a-z0-9-]/g, "-")
          .replace(/-+/g, "-")
          .replace(/^-|-$/g, "");
        if (!name || /^\d/.test(name)) return;
        if (findArea(name)) {
          input.value = "";
          return;
        }
        state.areas.push({ name, color: nextColor() });
        state.activeTool = name;
        render();
        setTimeout(() => {
          const i2 = document.getElementById("new-area-input");
          if (i2) i2.focus();
        }, 30);
      }
      function removeArea(name) {
        state.areas = state.areas.filter((a) => a.name !== name);
        for (let r = 0; r < state.rows; r++) {
          for (let c = 0; c < state.cols; c++) {
            if (state.grid[r][c] === name) state.grid[r][c] = null;
          }
        }
        if (state.activeTool === name) state.activeTool = "eraser";
        render();
      }
      function loadPreset(key) {
        const p = PRESETS[key];
        if (!p) return;
        const areas = [];
        const seen = new Set();
        p.layout.forEach((row) =>
          row.forEach((name) => {
            if (!seen.has(name)) {
              seen.add(name);
              areas.push({ name, color: AREA_COLORS[areas.length % AREA_COLORS.length] });
            }
          })
        );
        state = {
          rows: p.rows,
          cols: p.cols,
          gap: p.gap,
          areas,
          grid: p.layout.map((row) => row.slice()),
          colTracks: p.colTracks.slice(),
          rowTracks: p.rowTracks.slice(),
          activeTool: areas[0] ? areas[0].name : "eraser",
          copied: false
        };
        render();
      }
      function resetAll() {
        state = freshState();
        render();
      }
      function copyCSS() {
        const rules = buildRules();
        const text = formatRulesPlain(rules);
        const done = () => {
          state.copied = true;
          render();
          setTimeout(() => {
            state.copied = false;
            render();
          }, 2000);
        };
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard
            .writeText(text)
            .then(done)
            .catch(() => fallbackCopy(text, done));
        } else {
          fallbackCopy(text, done);
        }
      }
      function fallbackCopy(text, cb) {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.select();
        try {
          document.execCommand("copy");
        } catch (e) {}
        document.body.removeChild(ta);
        cb();
      }

      /* ---------- INIT ---------- */
      loadPreset("holyGrail");
    </script>
  </body>
</html>
